<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔡文國小資訊競賽報名與成績系統</title>
    <!-- 引入 Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 30px;
            padding-bottom: 50px;
        }

        .main-container {
            max-width: 1550px;
            margin: 0 auto;
        }

        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        @media (min-width: 992px) {
            .sticky-form {
                position: sticky;
                top: 30px;
                z-index: 100;
            }
        }

        .d-none-custom {
            display: none !important;
        }

        .rank-highlight {
            font-weight: 900;
            color: #dc3545;
            font-size: 1.1em;
        }

        .row-absent {
            background-color: #e9ecef !important;
            opacity: 0.7;
        }

        .row-absent td {
            text-decoration: line-through;
            color: #6c757d;
        }

        .row-absent td.action-cell {
            text-decoration: none;
        }

        .feedback-cell {
            max-width: 220px;
            font-size: 0.78rem;
            color: #495057;
            white-space: pre-line;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            text-align: left;
            cursor: pointer;
        }

        .feedback-cell.expanded {
            -webkit-line-clamp: unset;
            white-space: pre-line;
        }

        .score-badge {
            font-size: 1.1em;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .score-badge.high {
            background: #d1fae5;
            color: #065f46;
        }

        .score-badge.mid {
            background: #fff3cd;
            color: #856404;
        }

        .score-badge.low {
            background: #fee2e2;
            color: #991b1b;
        }

        .score-badge.none {
            background: #f3f4f6;
            color: #9ca3af;
        }

        .screenshot-thumb {
            width: 80px;
            height: 52px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #dee2e6;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
        }

        .screenshot-thumb:hover {
            transform: scale(1.08);
            border-color: #0d6efd;
        }

        #screenshotLightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        #screenshotLightbox.active {
            display: flex;
        }

        #screenshotLightbox img {
            max-width: 90vw;
            max-height: 88vh;
            border-radius: 8px;
            box-shadow: 0 8px 40px #000a;
        }

        #screenshotLightbox span {
            position: absolute;
            top: 18px;
            right: 28px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div class="container-fluid main-container">
        <!-- 提醒訊息區 (Placeholder for dynamic alerts) -->
        <div id="messageContainer"></div>

        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card sticky-form">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">新增報名資料</h4>
                    </div>
                    <div class="card-body">
                        <form id="addStudentForm">
                            <div class="mb-3">
                                <label for="school_year" class="form-label text-primary fw-bold">所屬學年度</label>
                                <select class="form-select border-primary" id="school_year" required></select>
                            </div>
                            <div class="mb-3">
                                <label for="classSelect" class="form-label">班級</label>
                                <select class="form-select" id="classSelect" required>
                                    <option value="" selected disabled>選擇班級</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="number" class="form-label">座號</label>
                                <input type="number" class="form-control" id="number" min="1" max="100" required
                                    placeholder="例如: 5">
                            </div>
                            <div class="mb-3">
                                <label for="name" class="form-label">姓名</label>
                                <input type="text" class="form-control" id="name" required placeholder="學生姓名">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    <span class="spinner-border spinner-border-sm d-none" role="status"
                                        aria-hidden="true" id="submitSpinner"></span>
                                    新增資料
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="card">
                    <div
                        class="card-header bg-dark text-white d-flex flex-column flex-sm-row justify-content-between align-items-sm-center py-3">
                        <h4 class="mb-2 mb-sm-0">
                            <span class="text-warning" id="viewYearTitle">載入中...</span> 已報名學生列表
                        </h4>
                        <div class="d-flex align-items-center">
                            <label for="view_year" class="me-2 text-nowrap mb-0">切換學年:</label>
                            <select id="view_year" class="form-select form-select-sm" style="width: 120px;"></select>
                        </div>
                    </div>

                    <div class="card-body p-3 bg-light border-bottom">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div class="btn-group flex-wrap" role="group" aria-label="年級篩選">
                                <button type="button" class="btn btn-outline-primary filter-btn active"
                                    data-filter="3">3年級</button>
                                <button type="button" class="btn btn-outline-primary filter-btn"
                                    data-filter="4">4年級</button>
                                <button type="button" class="btn btn-outline-primary filter-btn"
                                    data-filter="5">5年級</button>
                                <button type="button" class="btn btn-outline-primary filter-btn"
                                    data-filter="6">6年級</button>
                                <button type="button" class="btn btn-outline-primary filter-btn"
                                    data-filter="all">顯示全部</button>
                            </div>
                            <span class="badge bg-secondary fs-6 ms-2">顯示人數: <span id="studentCount">0</span> 人</span>
                        </div>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm table-striped table-hover mb-0 text-center align-middle"
                                id="studentTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>狀態</th>
                                        <th>學年度</th>
                                        <th>ID</th>
                                        <th>名次</th>
                                        <th>班級</th>
                                        <th>座號</th>
                                        <th>姓名</th>
                                        <th>總分</th>
                                        <th>整體評語</th>
                                        <th>程式截圖</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody">
                                    <!-- 動態資料將載入至此 -->
                                    <tr>
                                        <td colspan="10" class="text-muted py-4">資料載入中...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="card-footer bg-white d-none" id="noticeFooter">
                        <div class="alert alert-warning mb-0" role="alert">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            <span id="noticeText" class="fw-bold"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 截圖 Lightbox -->
    <div id="screenshotLightbox" onclick="this.classList.remove('active')">
        <span onclick="document.getElementById('screenshotLightbox').classList.remove('active')">&times;</span>
        <img id="screenshotLightboxImg" src="" alt="程式截圖全覽">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase v10 Modular SDK Initialization -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, getDocs, addDoc, updateDoc, doc, Timestamp, onSnapshot }
            from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // 使用者提供的 Web 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBdvER5CShHoJpfrIHsm3euK4UrjygJq1k",
            authDomain: "myreadingcheckin.firebaseapp.com",
            projectId: "myreadingcheckin",
            storageBucket: "myreadingcheckin.firebasestorage.app",
            messagingSenderId: "476306591390",
            appId: "1:476306591390:web:09136db5827fbbdd81358f",
            measurementId: "G-8YMJSXPHM7"
        };

        // === 設定開關：是否開放報名 ===
        const IS_REGISTRATION_OPEN = false; // 改成 true 即可開啟

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 處理報名開關 UI
        if (!IS_REGISTRATION_OPEN) {
            const form = document.getElementById('addStudentForm');
            const cardBody = form.parentElement;
            form.classList.add('d-none'); // 隱藏表單

            // 插入提示訊息
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-warning fw-bold text-center my-3';
            alertDiv.innerHTML = '<i class="bi bi-lock-fill me-2"></i> 目前不開放報名';
            cardBody.appendChild(alertDiv);
        }

        let currentData = [];
        let currentFilter = '3';
        let currentYear = 114;

        // UI 產生班級選單
        const classSelect = document.getElementById('classSelect');
        for (let grade = 3; grade <= 6; grade++) {
            for (let cls = 1; cls <= 6; cls++) {
                let classNum = cls.toString().padStart(2, '0');
                let value = `${grade}${classNum}`;
                let option = document.createElement('option');
                option.value = value;
                option.textContent = value + " 班";
                classSelect.appendChild(option);
            }
        }

        // 產生學年度選單
        const yearSelectAdd = document.getElementById('school_year');
        const yearSelectView = document.getElementById('view_year');
        for (let y = 112; y <= 120; y++) {
            const op1 = new Option(`${y} 學年度`, y, false, y === currentYear);
            const op2 = new Option(`${y} 學年度`, y, false, y === currentYear);
            yearSelectAdd.add(op1);
            yearSelectView.add(op2);
        }

        // 切換學年
        yearSelectView.addEventListener('change', (e) => {
            currentYear = parseInt(e.target.value);
            document.getElementById('viewYearTitle').textContent = `${currentYear} 學年度`;
            fetchData();
        });
        document.getElementById('viewYearTitle').textContent = `${currentYear} 學年度`;

        // 提示訊息對應表
        const noticeTexts = {
            '3': '3年級資訊認證比賽時間3月23日，比賽地點：電腦教室一；比賽時間：早自修。請導師核予以上同學公假參與。',
            '4': '4年級資訊認證比賽時間3月24日，比賽地點：電腦教室一；比賽時間：早自修。請導師核予以上同學公假參與。',
            '5': '5年級資訊認證比賽時間3月26日，比賽地點：電腦教室一；比賽時間：早自修。請導師核予以上同學公假參與。',
            '6': '6年級資訊認證比賽時間3月27日，比賽地點：電腦教室一；比賽時間：早自修。請導師核予以上同學公假參與。'
        };

        // 篩選功能
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.getAttribute('data-filter');
                renderTable();

                const noticeFooter = document.getElementById('noticeFooter');
                const noticeText = document.getElementById('noticeText');
                if (currentFilter !== 'all' && noticeTexts[currentFilter]) {
                    noticeText.textContent = noticeTexts[currentFilter];
                    noticeFooter.classList.remove('d-none');
                } else {
                    noticeFooter.classList.add('d-none');
                }
            });
        });

        // 取資料與監聽
        function fetchData() {
            const compRef = collection(db, "competition");
            // 由於 Firestore 不能直接做多欄位複雜 orderBy unless we create index, 
            // 若為確保運作，先過濾 school_year，再利用 JavaScript 排序
            const q = query(compRef, where("school_year", "==", currentYear));

            // 使用 onSnapshot 即時監聽
            onSnapshot(q, (snapshot) => {
                currentData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // 排序邏輯: 優先 rank (沒 rank 擺後面)，接著看班級與座號
                currentData.sort((a, b) => {
                    let rA = (a.rank && a.rank > 0) ? parseInt(a.rank) : 9999;
                    let rB = (b.rank && b.rank > 0) ? parseInt(b.rank) : 9999;
                    if (rA !== rB) return rA - rB;
                    if (a.class !== b.class) return (a.class || "").localeCompare(b.class || "");
                    return parseInt(a.number || 0) - parseInt(b.number || 0);
                });
                renderTable();
            }, (error) => {
                console.error("Error fetching data: ", error);
                document.getElementById('studentTableBody').innerHTML = `<tr><td colspan="10" class="text-danger py-4">資料載入失敗: ${error.message}</td></tr>`;
            });
        }

        // 畫表格
        function renderTable() {
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';

            let visibleCount = 0;
            const fragment = document.createDocumentFragment();

            currentData.forEach(row => {
                const grade = row.class ? row.class.toString().substring(0, 1) : '';
                if (currentFilter !== 'all' && grade !== currentFilter) return;

                visibleCount++;

                const tr = document.createElement('tr');
                const isAbsent = (row.is_absent == 1 || row.is_absent == true);
                if (isAbsent) tr.className = 'row-absent';

                // 出缺席狀態
                const tdAction = document.createElement('td');
                tdAction.className = 'action-cell';
                const btnAction = document.createElement('button');
                btnAction.className = `btn btn-sm ${isAbsent ? 'btn-danger' : 'btn-outline-success'}`;
                btnAction.textContent = isAbsent ? '已缺席' : '出席';
                btnAction.onclick = () => toggleAbsent(row.id, isAbsent);
                tdAction.appendChild(btnAction);

                // 其他顯示列
                const displayRank = (row.rank && row.rank > 0) ? row.rank : '-';
                const rankClass = (displayRank === 1 || displayRank === 2 || displayRank === 3 || displayRank === '1' || displayRank === '2' || displayRank === '3') ? 'rank-highlight text-warning' : '';

                let scoreBadgeClass = 'none';
                let scoreVal = '—';
                if (row.score !== null && row.score !== undefined && row.score !== '') {
                    scoreVal = parseInt(row.score);
                    if (scoreVal >= 80) scoreBadgeClass = 'high';
                    else if (scoreVal >= 60) scoreBadgeClass = 'mid';
                    else scoreBadgeClass = 'low';
                }

                const feedbackText = (row.feedback && row.feedback.trim() !== '') ? row.feedback : '尚未評分';
                const screenshotHtml = row.screenshot_path ? `<img src="${row.screenshot_path}" class="screenshot-thumb" alt="程式截圖" onclick="window.showScreenshot('${row.screenshot_path}')">` : '<span class="text-muted small">—</span>';

                tr.innerHTML += `
                    <td><span class="badge bg-secondary">${row.school_year || currentYear}</span></td>
                    <td class="text-muted">${row.study_ID || row.id.substring(0, 6)}</td>
                    <td class="${rankClass}">${displayRank === '1' || displayRank === 1 ? '<i class="bi bi-trophy-fill text-warning me-1"></i>' : ''}${displayRank}</td>
                    <td><span class="badge bg-info text-dark">${row.class || ''}</span></td>
                    <td>${row.number || ''}</td>
                    <td class="fw-bold">${row.name || ''}</td>
                    <td class="text-center"><span class="score-badge ${scoreBadgeClass}">${scoreVal}</span></td>
                    <td><div class="feedback-cell" onclick="this.classList.toggle('expanded')" title="點擊展開/收起">${feedbackText.replace(/\\n/g, '<br>')}</div></td>
                    <td class="text-center">${screenshotHtml}</td>
                `;
                tr.insertBefore(tdAction, tr.firstChild);
                fragment.appendChild(tr);
            });

            // 處理提醒訊息顯示
            const noticeFooter = document.getElementById('noticeFooter');
            const noticeText = document.getElementById('noticeText');
            if (currentFilter !== 'all' && noticeTexts[currentFilter]) {
                noticeText.textContent = noticeTexts[currentFilter];
                noticeFooter.classList.remove('d-none');
            } else {
                noticeFooter.classList.add('d-none');
            }

            if (visibleCount === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-muted py-4">目前尚無此條件的報名資料</td></tr>';
            } else {
                tbody.appendChild(fragment);
            }
            document.getElementById('studentCount').textContent = visibleCount;
        }

        function showMessage(msg, isSuccess = true) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="alert alert-${isSuccess ? 'success' : 'danger'} alert-dismissible fade show" role="alert">
                ${msg} <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>`;
        }

        // 切換點名
        async function toggleAbsent(docId, currentAbsenceStatus) {
            try {
                const docRef = doc(db, "competition", docId);
                // Firestore is_absent update
                await updateDoc(docRef, { is_absent: currentAbsenceStatus ? 0 : 1 });
            } catch (error) {
                console.error("更新點名狀態失敗", error);
                alert("更新失敗：" + error.message);
            }
        }

        // 綁定全域 lightbox (因為 onclick 寫在 html字串中)
        window.showScreenshot = function (url) {
            document.getElementById('screenshotLightboxImg').src = url;
            document.getElementById('screenshotLightbox').classList.add('active');
        };

        // 處理表單新增
        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('submitSpinner');

            const newData = {
                school_year: parseInt(document.getElementById('school_year').value, 10),
                class: document.getElementById('classSelect').value,
                number: parseInt(document.getElementById('number').value, 10),
                name: document.getElementById('name').value,
                is_absent: 0,
                rank: null,
                score: null,
                feedback: null,
                screenshot_path: null,
                study_ID: document.getElementById('classSelect').value + document.getElementById('number').value.padStart(2, '0') + new Date().getTime().toString().slice(-4)
            };

            try {
                btn.disabled = true; spinner.classList.remove('d-none');
                await addDoc(collection(db, "competition"), newData);
                showMessage("資料新增成功！");
                document.getElementById('addStudentForm').reset();
                document.getElementById('school_year').value = currentYear;
            } catch (error) {
                console.error("新增失敗", error);
                showMessage("寫入失敗：" + error.message, false);
            } finally {
                btn.disabled = false; spinner.classList.add('d-none');
            }
        });

        // 啟動
        fetchData();
    </script>
</body>

</html>
